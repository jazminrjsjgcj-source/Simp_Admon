# Entorno de desarrollo/pruebas para PUNTA con PostgreSQL.
#
# Levanta TRES servicios:
#   - app:    PHP 8.3 (CLI) con las extensiones que Laravel necesita, INCLUYENDO
#             pdo_pgsql (la que le falta al PHP de Windows). Aquí se corre artisan.
#   - worker: el mismo contenedor, pero corriendo `queue:work`. Es quien convierte
#             los PDF y los Word a texto, en segundo plano.
#   - db:     PostgreSQL 17, la base de pruebas.
#
# El código del proyecto se monta dentro de los contenedores, así que se edita en
# Windows normalmente y los contenedores ven los cambios al instante.
#
# ── POR QUÉ HAY UN WORKER Y ANTES NO ──
#
# Convertir un PDF a texto puede tardar minutos: pdftotext primero, y si falla,
# LibreOffice, que es lento y come memoria. Hasta ahora eso ocurría DENTRO de la
# petición del usuario, que se quedaba mirando la ruedecita del navegador.
#
# Y si el proceso moría a medias —porque nginx cortaba, o php-fpm cortaba, o el
# kernel mataba a LibreOffice por memoria—, la regulación se quedaba en el estado
# "procesando". Para siempre. Sin ningún error, sin ninguna lista de fallos, sin
# que nadie se enterara nunca.
#
# Con el worker, la conversión ocurre aparte. El usuario sube el archivo, ve
# "convirtiendo…", y sigue con lo suyo.
#
# Uso:
#   docker compose up -d              → levanta los tres servicios
#   docker compose exec app bash      → entra al contenedor a correr artisan
#   docker compose logs -f worker     → mira qué está convirtiendo el worker
#   docker compose down               → los apaga
#
# Para ver el sitio:
#   docker compose exec app php artisan serve --host=0.0.0.0 --port=8000
#   y abrir http://localhost:8000 en el navegador.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: punta-app
    working_dir: /var/www/html
    volumes:
      # Monta el proyecto (la carpeta actual) dentro del contenedor.
      - .:/var/www/html
    ports:
      # Expone el servidor de Laravel (artisan serve) en el 8000 de Windows,
      # para poder abrir el sitio desde el navegador en http://localhost:8000
      - "8000:8000"
    depends_on:
      - db
    networks:
      - punta-red
    # Mantiene el contenedor vivo para poder entrar con 'exec'.
    tty: true

  # ── EL WORKER ──
  #
  # Es el MISMO contenedor que `app` (misma imagen, mismo código montado), pero en vez
  # de quedarse esperando a que entres con `exec`, corre `queue:work` en bucle: coge
  # trabajos de la tabla `jobs` y los ejecuta.
  #
  # Los parámetros no son decorativos:
  #
  #   --tries=2       Reintenta una vez. Si un PDF tumba el proceso, el segundo intento
  #                   probablemente lo tumbe igual: reintentar diez veces solo alarga la
  #                   agonía y llena el log.
  #
  #   --timeout=300   Cinco minutos por trabajo. LibreOffice con un PDF de doscientas
  #                   páginas puede tardar varios. Si se pasa, el worker mata el proceso
  #                   y llama a failed(), que deja la regulación en 'error' con un mensaje.
  #                   ESE es el punto: un timeout controlado deja rastro; un proceso
  #                   muerto de golpe, no.
  #
  #   --max-time=3600 El worker se recicla cada hora. PHP no libera bien la memoria en
  #                   procesos largos: sin esto, un worker que lleva días vivo acaba
  #                   comiéndose la RAM. Al salir, Docker lo reinicia (restart: unless-stopped).
  #
  # OJO: el worker carga el código UNA VEZ, al arrancar. Si cambias una clase de un job
  # o de un servicio, hay que reiniciarlo:
  #
  #     docker compose restart worker
  #
  # Es la causa número uno de "he arreglado el bug y sigue fallando".
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: punta-worker
    working_dir: /var/www/html
    command: php artisan queue:work --tries=2 --timeout=300 --max-time=3600 --sleep=3
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    networks:
      - punta-red
    restart: unless-stopped

  db:
    image: postgres:17
    container_name: punta-db
    environment:
      POSTGRES_DB: punta
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: punta123
    ports:
      # Se expone en el 5433 de Windows para NO chocar con el postgres-punta
      # que ya tienes corriendo en el 5432.
      - "5433:5432"
    volumes:
      - punta-pgdata:/var/lib/postgresql/data
    networks:
      - punta-red

networks:
  punta-red:
    driver: bridge

volumes:
  punta-pgdata:
